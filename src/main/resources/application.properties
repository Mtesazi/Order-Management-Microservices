spring.application.name=order-management-microservices
server.port=8083
server.shutdown=graceful

spring.lifecycle.timeout-per-shutdown-phase=20s

spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging defaults: keep app-level events, avoid SQL/value noise.
logging.level.root=WARN
logging.level.com.pollinate=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.security.user.name=${APP_BASIC_USER:apiuser}
spring.security.user.password=${APP_BASIC_PASSWORD:apipassword}

# JWT Configuration (HS512 requires a secret of at least 64 bytes)
jwt.secret=${JWT_SECRET:myDefaultJwtSecretKeyForHs512MustBeAtLeastSixtyFourBytesLong123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

