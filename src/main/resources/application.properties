spring.application.name=order-management-microservices
server.port=8083

spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging ? framework noise suppressed; SQL routed through SLF4J (see logback-spring.xml)
logging.level.root=WARN
logging.level.com.pollinate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.security.user.name=apiuser
spring.security.user.password=apipassword

